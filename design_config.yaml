# Design Configuration for CV-Template
# This file contains all design settings. It is automatically merged with
# your CV content file (example_CV.yaml) when running anschmiegcv render.

design:
  # Theme selection
  theme: anschmiegcv

  # Page settings (PDF)
  page:
    size: a4 # Options: a4, us-letter, a5, us-executive
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.7in
    right_margin: 0.7in
    show_footer: true
    show_top_note: false

  # Color scheme - easily customizable
  colors:
    # Primary brand color (used for name, links, accents)
    seed: rgb(0, 120, 135) # Teal/cyan - main brand color
    accent_seed: rgb(0, 138, 155) # Slightly lighter accent

  # Typography
  typography:
    font_family: Source Sans 3
    line_spacing: 0.6em
    alignment: justified
    small_caps:
      section_titles: true

  # Links
  links:
    underline: false
    show_external_link_icon: true

  # Header layout
  header:
    alignment: left # Options: left, center, right
    photo_width: 3.5cm # Size of profile photo
    photo_space_left: 0cm # Left padding for photo alignment
    photo_space_right: 0.5cm # Right padding between photo and content
    space_below_name: 0.5cm
    connections:
      show_icons: true
      separator: ""
      space_between_connections: 0.5cm

  # Section styling
  section_titles:
    type: with_full_line # Options: with_partial_line, with_full_line, without_line, moderncv
    line_thickness: 1pt
    space_above: 0.67cm
    space_below: 0.33cm

  # Entry spacing
  sections:
    space_between_regular_entries: 0.5cm
    show_time_spans_in: []
  entries:
    allow_page_break: false
    date_and_location_width: 3cm
    space_between_columns: 1cm

  # Templates for date formatting
  templates:
    single_date: "MONTH_ABBREVIATION YEAR"
    date_range: "START_DATE – END_DATE"
    time_span: "HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS"
    footer: "NAME -- Page PAGE_NUMBER of TOTAL_PAGES"
    education_entry:
      main_column: |
        AREA, DEGREE
        INSTITUTION
        HIGHLIGHTS
      date_and_location_column: "LOCATION\nDATE"
      degree_column: null
      # Custom styling for education entries (anschmiegcv-specific)
      style:
        area:
          color: "primary" # Options: "text" (grey), "primary" (teal)
          weight: 700 # 400=regular, 600=semi-bold, 700=bold
        degree:
          color: "text" # Options: "text" (grey), "primary" (teal)
          weight: 500 # 400=regular, 600=semi-bold, 700=bold
        institution:
          color: "text" # Options: "text" (grey), "primary" (teal)
          weight: 600 # 400=regular, 600=semi-bold, 700=bold
    experience_entry:
      date_and_location_column: "LOCATION\nDATE"

settings:
  current_date: "2026-03-24"
  bold_keywords:
    - Python
    - SQL
    - Project Management
    - Agile
    - Scrum
    - C1
